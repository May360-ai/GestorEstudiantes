<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, shrink-to-fit=no">
<title>Bootstrap CRUD Estudiantes</title>
<link rel="stylesheet" href="https://fonts.googleapis.com/css?family=Roboto|Varela+Round">
<link rel="stylesheet" href="https://stackpath.bootstrapcdn.com/bootstrap/4.5.0/css/bootstrap.min.css">
<link rel="stylesheet" href="https://fonts.googleapis.com/icon?family=Material+Icons">
<link rel="stylesheet" href="https://maxcdn.bootstrapcdn.com/font-awesome/4.7.0/css/font-awesome.min.css">
<script src="https://code.jquery.com/jquery-3.5.1.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/popper.js@1.16.0/dist/umd/popper.min.js"></script>
<script src="https://stackpath.bootstrapcdn.com/bootstrap/4.5.0/js/bootstrap.min.js"></script>
<style>
/* ... (estilos de la plantilla intactos) ... */
body { color: #566787; background: #f5f5f5; font-family: 'Varela Round', sans-serif; font-size: 13px; }
.table-responsive { margin: 30px 0; }
.table-wrapper { background: #fff; padding: 20px 25px; border-radius: 3px; min-width: 1000px; box-shadow: 0 1px 1px rgba(0,0,0,.05); }
.table-title { padding-bottom: 15px; background: #435d7d; color: #fff; padding: 16px 30px; min-width: 100%; margin: -20px -25px 10px; border-radius: 3px 3px 0 0; }
.table-title h2 { margin: 5px 0 0; font-size: 24px; }
.table-title .btn-group { float: right; }
.table-title .btn { color: #fff; float: right; font-size: 13px; border: none; min-width: 50px; border-radius: 2px; border: none; outline: none !important; margin-left: 10px; }
.table-title .btn i { float: left; font-size: 21px; margin-right: 5px; }
.table-title .btn span { float: left; margin-top: 2px; }
table.table tr th, table.table tr td { border-color: #e9e9e9; padding: 12px 15px; vertical-align: middle; }
table.table tr th:first-child { width: 60px; }
table.table tr th:last-child { width: 100px; }
table.table-striped tbody tr:nth-of-type(odd) { background-color: #fcfcfc; }
table.table-striped.table-hover tbody tr:hover { background: #f5f5f5; }
table.table th i { font-size: 13px; margin: 0 5px; cursor: pointer; }	
table.table td:last-child i { opacity: 0.9; font-size: 22px; margin: 0 5px; }
table.table td a { font-weight: bold; color: #566787; display: inline-block; text-decoration: none; outline: none !important; }
table.table td a:hover { color: #2196F3; }
table.table td a.edit { color: #FFC107; }
table.table td a.delete { color: #F44336; }
table.table td i { font-size: 19px; }
.hint-text { float: left; margin-top: 10px; font-size: 13px; }    
.modal .modal-dialog { max-width: 400px; }
.modal .modal-header, .modal .modal-body, .modal .modal-footer { padding: 20px 30px; }
.modal .modal-content { border-radius: 3px; font-size: 14px; }
.modal .modal-footer { background: #ecf0f1; border-radius: 0 0 3px 3px; }
.modal .modal-title { display: inline-block; }
.modal .form-control { border-radius: 2px; box-shadow: none; border-color: #dddddd; }
.modal .btn { border-radius: 2px; min-width: 100px; }	
</style>
</head>
<body>
<div class="container-xl">
	<div class="table-responsive">
		<div class="table-wrapper">
			<div class="table-title">
				<div class="row">
					<div class="col-sm-6">
						<h2>Manage <b>Students</b></h2>
					</div>
					<div class="col-sm-6">
						<!-- CAMBIO: Se añadió id="btnAbrirModalAdd" para resetear el modo a POST -->
						<a href="#studentModal" id="btnAbrirModalAdd" class="btn btn-success" data-toggle="modal"><i class="material-icons">&#xE147;</i> <span>Add New Student</span></a>
					</div>
				</div>
			</div>
			<table class="table table-striped table-hover">
				<thead>
					<tr>
						<th>Cedula</th>
						<th>Nombre</th>
						<th>Apellido</th>
						<th>Phone</th>
						<th>Address</th>
						<th>Actions</th>
					</tr>
				</thead>
				<!-- CAMBIO: id="tbodyEstudiantes" para que JS inyecte las filas aquí -->
				<tbody id="tbodyEstudiantes">
					<!-- Los datos se cargarán dinámicamente -->
				</tbody>
			</table>
		</div>
	</div>        
</div>

<!-- Modal Único para Add/Edit -->
<!-- CAMBIO: id="studentModal" unificado para ambas acciones -->
<div id="studentModal" class="modal fade">
	<div class="modal-dialog">
		<div class="modal-content">
			<!-- CAMBIO: id="formEstudiante" para capturar los datos fácilmente -->
			<form id="formEstudiante">
				<div class="modal-header">						
					<h4 class="modal-title" id="modalTitle">Add Student</h4>
					<button type="button" class="close" data-dismiss="modal" aria-hidden="true">&times;</button>
				</div>
				<div class="modal-body">					
					<div class="form-group">
						<label>Cedula</label>
						<!-- CAMBIO: name="txtCedula" e id="txtCedula" coinciden con backend -->
						<input type="text" id="txtCedula" name="txtCedula" class="form-control" required>
					</div>
					<div class="form-group">
						<label>Nombre</label>
						<input type="text" id="txtNombre" name="txtNombre" class="form-control" required>
					</div>
					<div class="form-group">
						<label>Apellido</label>
						<input type="text" id="txtApellido" name="txtApellido" class="form-control" required>
					</div>
					<div class="form-group">
						<label>Phone</label>
						<input type="text" id="txtTelefono" name="txtTelefono" class="form-control">
					</div>
					<div class="form-group">
						<label>Address</label>
						<input type="text" id="txtDireccion" name="txtDireccion" class="form-control">
					</div>					
				</div>
				<div class="modal-footer">
					<input type="button" class="btn btn-default" data-dismiss="modal" value="Cancel">
					<!-- CAMBIO: id="btnGuardar" para disparar el evento AJAX -->
					<input type="button" id="btnGuardar" class="btn btn-success" value="Save">
				</div>
			</form>
		</div>
	</div>
</div>

<!-- Delete Modal HTML -->
<div id="deleteEmployeeModal" class="modal fade">
	<div class="modal-dialog">
		<div class="modal-content">
			<form>
				<div class="modal-header">						
					<h4 class="modal-title">Delete Student</h4>
					<button type="button" class="close" data-dismiss="modal" aria-hidden="true">&times;</button>
				</div>
				<div class="modal-body">					
					<p>Are you sure you want to delete this Record?</p>
					<p class="text-warning"><small>This action cannot be undone.</small></p>
				</div>
				<div class="modal-footer">
					<input type="button" class="btn btn-default" data-dismiss="modal" value="Cancel">
					<!-- CAMBIO: id="btnConfirmarEliminar" -->
					<input type="button" id="btnConfirmarEliminar" class="btn btn-danger" value="Delete">
				</div>
			</form>
		</div>
	</div>
</div>

<!-- CAMBIO: Se asegura la ruta correcta del script -->
<script src="js/app.js"></script>
</body>
</html>
